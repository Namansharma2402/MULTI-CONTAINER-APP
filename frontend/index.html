<!DOCTYPE html>
<html>
<head>
  <title>DevOps App</title>
</head>
<body>

<h1>Multi-Container App</h1>
<button onclick="fetchData()">Get Data</button>

<p id="output"></p>

<script>
function fetchData() {
  fetch("http://localhost:5000/api")
    .then(res => res.json())
    .then(data => {
      document.getElementById("output").innerText = data.message;
    });
}
</script>

</body>
</html>
